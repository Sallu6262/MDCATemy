<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Test Maker · Step 2 · MDCATEMY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    .mesh-bg { background-color: #121212; background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 198, 0, 0.14), transparent), radial-gradient(ellipse 60% 40% at 100% 40%, rgba(255, 198, 0, 0.05), transparent); }
    .grid-lines { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); }
  </style>
</head>
<body class="min-h-screen text-white font-[Inter,sans-serif] antialiased">
  <div class="mx-auto flex min-h-screen max-w-2xl flex-col px-4 pb-28 pt-8 sm:px-6 lg:px-8">
    <header class="mb-8">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-[#FFC600]">Custom test maker</p>
      <h1 class="mt-2 text-2xl font-black tracking-tight sm:text-3xl">Step 2 — New test details</h1>
      <p class="mt-2 text-sm text-white/55">Upload a CSV blueprint and set schedule metadata (static form — no submit).</p>
      <div class="mt-4 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 text-xs text-white/50">
        <span class="font-semibold text-[#FFC600]">2</span> / 4
      </div>
    </header>

    <section class="flex-1 rounded-2xl border border-white/10 bg-[#1A1A1A]/90 p-5 shadow-[0_24px_80px_rgba(0,0,0,0.45)] sm:p-8">
      <p class="text-xs font-semibold uppercase tracking-[0.14em] text-[#FFC600]">Test configuration</p>
      <p class="mt-1 text-sm text-white/45">Fields map to your API: file, duration, count, date, name.</p>

      <form class="mt-8 space-y-6" action="#" method="get">
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-white/50" for="csv-file">CSV file</label>
          <div class="rounded-xl border border-dashed border-white/15 bg-[#121212]/80 p-6 text-center">
            <input id="csv-file" name="csv" type="file" accept=".csv,text/csv" class="sr-only" />
            <label for="csv-file" class="inline-flex cursor-pointer items-center justify-center rounded-xl bg-[#FFC600] px-6 py-3 text-sm font-black uppercase tracking-wider text-[#181A18] shadow-[0_8px_28px_rgba(255,198,0,0.2)] transition hover:brightness-105">
              Upload CSV file
            </label>
            <p class="mt-3 text-xs text-white/40">Accepts .csv · Max size enforced on server</p>
          </div>
        </div>

        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-white/50" for="test-name">Test name</label>
          <input id="test-name" name="test_name" type="text" placeholder="e.g. March Bio–Chem combined" class="w-full rounded-xl border border-white/10 bg-[#121212] px-4 py-3 text-sm text-white placeholder:text-white/30 focus:border-[#FFC600]/50 focus:outline-none focus:ring-2 focus:ring-[#FFC600]/20" />
        </div>

        <div class="grid gap-6 sm:grid-cols-2">
          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-white/50" for="time-min">Time (minutes)</label>
            <input id="time-min" name="time_minutes" type="number" min="1" placeholder="90" class="w-full rounded-xl border border-white/10 bg-[#121212] px-4 py-3 text-sm text-white placeholder:text-white/30 focus:border-[#FFC600]/50 focus:outline-none focus:ring-2 focus:ring-[#FFC600]/20" />
          </div>
          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-white/50" for="mcq-count">MCQ count</label>
            <input id="mcq-count" name="mcq_count" type="number" min="1" placeholder="100" class="w-full rounded-xl border border-white/10 bg-[#121212] px-4 py-3 text-sm text-white placeholder:text-white/30 focus:border-[#FFC600]/50 focus:outline-none focus:ring-2 focus:ring-[#FFC600]/20" />
          </div>
        </div>

        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-white/50" for="test-date">Date for test</label>
          <input id="test-date" name="test_date" type="date" value="2026-04-20" class="w-full rounded-xl border border-white/10 bg-[#121212] px-4 py-3 text-sm text-white focus:border-[#FFC600]/50 focus:outline-none focus:ring-2 focus:ring-[#FFC600]/20 [color-scheme:dark]" />
        </div>
      </form>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 z-30 border-t border-white/10 bg-[#121212]/95 px-4 py-4 backdrop-blur-md">
      <div class="mx-auto flex max-w-2xl items-center justify-between gap-3">
        <a href="step1.html" class="inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-xl border border-white/15 bg-white/[0.04] px-5 text-sm font-semibold text-white/85 transition hover:border-white/25 hover:bg-white/[0.07]">Back</a>
        <a href="step3.html" class="inline-flex min-h-[44px] items-center justify-center rounded-xl bg-[#FFC600] px-6 text-sm font-black uppercase tracking-wider text-[#181A18] shadow-[0_8px_28px_rgba(255,198,0,0.25)] transition hover:brightness-105">Next</a>
      </div>
    </nav>
  </div>
</body>
</html>

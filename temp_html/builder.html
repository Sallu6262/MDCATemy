<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Builder - Step 1: Subjects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Poppins:wght@600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            mdcat: '#FFC600',
            warriorBlack: '#0E0F0E',
            darkCharcoal: '#181A18',
            warriorBorder: '#2D302D',
            warriorText: '#8B8E8B',
            bio: '#10B981',
            chem: '#38BDF8',
            phy: '#A78BFA',
            eng: '#2DD4BF',
            logic: '#FB923C'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-warriorBlack text-white font-inter antialiased">
  <div class="mx-auto max-w-6xl px-4 py-6 lg:px-8">
    <header class="mb-6 flex items-center gap-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-lg border border-mdcat/25 bg-mdcat/10">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="text-mdcat"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div>
        <h1 class="font-poppins text-xl font-black">Quiz Builder</h1>
        <p class="text-xs text-warriorText">Pick subjects, chapters and settings - then generate.</p>
      </div>
    </header>

    <div class="mx-auto flex max-w-3xl flex-col gap-4">
      <div class="flex items-center gap-2">
        <div class="flex flex-1 items-center gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-warriorBlack bg-mdcat font-poppins text-xs font-black text-warriorBlack shadow-[2px_2px_0px_rgba(0,0,0,0.5)]">1</div>
          <span class="font-poppins text-xs font-black uppercase tracking-[0.1em]">Subjects</span>
          <div class="h-[2px] flex-1 bg-warriorBorder"></div>
        </div>
        <div class="flex flex-1 items-center gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-warriorBorder bg-warriorBlack font-poppins text-xs font-black text-warriorText">2</div>
          <span class="font-poppins text-xs font-black uppercase tracking-[0.1em] text-warriorText">Chapters</span>
          <div class="h-[2px] flex-1 bg-warriorBorder"></div>
        </div>
        <div class="flex flex-1 items-center gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-warriorBorder bg-warriorBlack font-poppins text-xs font-black text-warriorText">3</div>
          <span class="font-poppins text-xs font-black uppercase tracking-[0.1em] text-warriorText">Topics</span>
          <div class="h-[2px] flex-1 bg-warriorBorder"></div>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-warriorBorder bg-warriorBlack font-poppins text-xs font-black text-warriorText">4</div>
          <span class="font-poppins text-xs font-black uppercase tracking-[0.1em] text-warriorText">Settings</span>
        </div>
      </div>

      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-2 px-1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="text-mdcat"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="text-xs font-semibold text-warriorText/70">Show accuracy</span>
          <span class="relative h-5 w-9 rounded-full bg-mdcat"><span class="absolute left-[18px] top-[3px] h-3.5 w-3.5 rounded-full bg-white"></span></span>
        </div>

        <a href="smart-select.html?from=builder.html" class="inline-flex items-center gap-1.5 rounded-lg border border-warriorBorder bg-warriorBlack/30 px-3 py-1.5 font-poppins text-[11px] font-black uppercase tracking-[0.06em] text-warriorText transition hover:border-mdcat/60 hover:bg-mdcat/5 hover:text-white">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="text-mdcat"><path d="M12 3l1.9 5.6L19.5 10l-4.6 2.4L13 18l-1-5.6L7.5 10l5.6-1.4L12 3z"/></svg>
          Smart Select
          <span class="rounded-full bg-mdcat/20 px-1.5 py-0.5 text-[8px] text-mdcat">NEW</span>
        </a>
      </div>

      <section class="overflow-hidden rounded-2xl border-2 border-warriorBorder bg-darkCharcoal shadow-[4px_4px_0px_rgba(255,198,0,0.1)]">
        <div class="flex flex-wrap items-center gap-3 border-b border-warriorBorder/60 bg-warriorBlack/20 px-4 py-3">
          <span class="font-poppins text-[9px] font-black uppercase tracking-[0.14em] text-warriorText/50">Your Prep</span>
          <span class="flex items-center gap-1 text-[10px] text-emerald-400"><span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>Strong >=75%</span>
          <span class="flex items-center gap-1 text-[10px] text-amber-400"><span class="h-1.5 w-1.5 rounded-full bg-amber-400"></span>Improving 50-74%</span>
          <span class="flex items-center gap-1 text-[10px] text-red-400"><span class="h-1.5 w-1.5 rounded-full bg-red-400"></span>Needs work <50%</span>
        </div>

        <div class="p-4 lg:p-6">
          <div class="mb-4 flex items-center justify-between">
            <p class="font-poppins text-[11px] font-black uppercase tracking-[0.14em] text-mdcat">Select Subjects</p>
            <p class="text-xs text-warriorText">1 selected</p>
          </div>

          <div class="grid gap-2 lg:grid-cols-2 lg:gap-3">
            <button class="flex w-full items-center gap-3 rounded-xl border-2 border-mdcat bg-mdcat/10 px-4 py-3 text-left text-white shadow-[3px_3px_0px_rgba(255,198,0,0.15)]">
              <span class="h-3 w-3 rounded-full border-2 border-warriorBlack bg-bio"></span>
              <span class="flex-1 font-poppins text-sm font-black">Biology</span>
              <span class="inline-flex items-center gap-1 rounded-full border border-emerald-400/25 bg-emerald-400/10 px-2 py-0.5 font-poppins text-[10px] font-black text-emerald-400"><span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>76%</span>
            </button>
            <button class="flex w-full items-center gap-3 rounded-xl border-2 border-warriorBorder px-4 py-3 text-left text-warriorText hover:border-mdcat/50">
              <span class="h-3 w-3 rounded-full border-2 border-warriorBlack bg-chem"></span>
              <span class="flex-1 font-poppins text-sm font-black">Chemistry</span>
              <span class="inline-flex items-center gap-1 rounded-full border border-amber-400/25 bg-amber-400/10 px-2 py-0.5 font-poppins text-[10px] font-black text-amber-400"><span class="h-1.5 w-1.5 rounded-full bg-amber-400"></span>67%</span>
            </button>
            <button class="flex w-full items-center gap-3 rounded-xl border-2 border-warriorBorder px-4 py-3 text-left text-warriorText hover:border-mdcat/50">
              <span class="h-3 w-3 rounded-full border-2 border-warriorBlack bg-phy"></span>
              <span class="flex-1 font-poppins text-sm font-black">Physics</span>
              <span class="inline-flex items-center gap-1 rounded-full border border-amber-400/25 bg-amber-400/10 px-2 py-0.5 font-poppins text-[10px] font-black text-amber-400"><span class="h-1.5 w-1.5 rounded-full bg-amber-400"></span>70%</span>
            </button>
            <button class="flex w-full items-center gap-3 rounded-xl border-2 border-warriorBorder px-4 py-3 text-left text-warriorText hover:border-mdcat/50">
              <span class="h-3 w-3 rounded-full border-2 border-warriorBlack bg-eng"></span>
              <span class="flex-1 font-poppins text-sm font-black">English</span>
              <span class="inline-flex items-center gap-1 rounded-full border border-emerald-400/25 bg-emerald-400/10 px-2 py-0.5 font-poppins text-[10px] font-black text-emerald-400"><span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>79%</span>
            </button>
            <button class="flex w-full items-center gap-3 rounded-xl border-2 border-warriorBorder px-4 py-3 text-left text-warriorText hover:border-mdcat/50 lg:col-span-2">
              <span class="h-3 w-3 rounded-full border-2 border-warriorBlack bg-logic"></span>
              <span class="flex-1 font-poppins text-sm font-black">Logical Reasoning</span>
              <span class="inline-flex items-center gap-1 rounded-full border border-amber-400/25 bg-amber-400/10 px-2 py-0.5 font-poppins text-[10px] font-black text-amber-400"><span class="h-1.5 w-1.5 rounded-full bg-amber-400"></span>63%</span>
            </button>
          </div>
        </div>
      </section>

      <div class="mt-2 flex gap-2">
        <a href="builder-chapters.html" class="flex flex-1 items-center justify-center gap-2 rounded-xl border-2 border-warriorBlack bg-mdcat px-5 py-3 font-poppins text-[13px] font-black uppercase tracking-[0.1em] text-warriorBlack shadow-[3px_3px_0px_rgba(0,0,0,0.55)] transition hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[1px_1px_0px_rgba(0,0,0,0.55)]">Next</a>
      </div>

      <p class="mt-3 text-center"><a href="index.html" class="text-xs text-warriorText">&larr; Back to mockup index</a></p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tailwind Slider Demo</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Remove default appearance */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
    }

    /* Track */
    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      background: #374151; /* gray-700 */
      border-radius: 9999px;
    }

    input[type="range"]::-moz-range-track {
      height: 8px;
      background: #374151;
      border-radius: 9999px;
    }

    /* Thumb */
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #FFC600;
      border-radius: 50%;
      cursor: pointer;
      margin-top: -6px; /* center thumb */
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #FFC600;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
  </style>
</head>

<body class="bg-[#0E0F0E] text-white flex items-center justify-center min-h-screen">

  <div class="w-96 p-6 rounded-2xl bg-[#1A1B1A] shadow-xl">

    <h1 class="text-lg font-bold mb-6 text-center">
      Drag Slider (HTML + Tailwind)
    </h1>

    <!-- Slider -->
    <input 
      type="range" 
      min="0" 
      max="100" 
      value="50"
      class="w-full cursor-pointer"
    />

    <!-- Labels -->
    <div class="flex justify-between text-sm mt-3 text-gray-400">
      <span>0</span>
      <span>50</span>
      <span>100</span>
    </div>

  </div>

</body>
</html>

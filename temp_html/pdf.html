<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skeleton UI Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      width: 400px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Skeleton base */
    .skeleton {
      position: relative;
      overflow: hidden;
      background: #2a2a2a;
      border-radius: 8px;
    }

    /* Shimmer effect */
    .skeleton::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.2),
        transparent
      );
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .line {
      height: 14px;
      margin-bottom: 10px;
    }

    .title {
      height: 20px;
      width: 70%;
      margin-bottom: 15px;
    }

    .option {
      height: 16px;
      margin-bottom: 8px;
    }

    /* Real content (hidden initially) */
    .hidden {
      display: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    
    <!-- Skeleton -->
    <div id="skeleton">
      <div class="skeleton title"></div>
      <div class="skeleton line"></div>
      <div class="skeleton line"></div>

      <div class="skeleton option"></div>
      <div class="skeleton option"></div>
      <div class="skeleton option"></div>
      <div class="skeleton option"></div>
    </div>

    <!-- Real Content -->
    <div id="content" class="hidden">
      <h3>What is the unit of acceleration?</h3>
      <p>A. m/s</p>
      <p>B. m/s²</p>
      <p>C. kg</p>
      <p>D. N</p>
    </div>

    <button onclick="loadContent()">Load Data</button>
  </div>

  <script>
    function loadContent() {
      const skeleton = document.getElementById("skeleton");
      const content = document.getElementById("content");

      // simulate API delay
      setTimeout(() => {
        skeleton.style.display = "none";
        content.classList.remove("hidden");
      }, 1500);
    }
  </script>

</body>
</html>

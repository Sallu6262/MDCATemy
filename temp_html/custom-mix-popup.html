<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom Mix Popup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Poppins:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ["Inter", "sans-serif"],
              poppins: ["Poppins", "sans-serif"],
            },
            colors: {
              mdcat: "#FFC600",
              warriorBlack: "#0E0F0E",
              darkCharcoal: "#181A18",
              warriorBorder: "#2D302D",
              warriorText: "#8B8E8B",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-warriorBlack font-inter text-white">
    <div class="relative min-h-screen">
      <div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>

      

      <div class="fixed inset-x-0 bottom-4 z-30 mx-auto w-[94%] max-w-md rounded-2xl border border-warriorBorder bg-darkCharcoal/95 p-4 shadow-[0_16px_45px_rgba(0,0,0,0.55)]">
        <div class="mb-2 flex items-start justify-between gap-3">
          <div>
            <h2 class="font-poppins text-xl font-black leading-tight">Custom Mix</h2>
            <p class="text-[11px] text-warriorText">Drag sliders - they auto-balance to 100%</p>
          </div>
          <button class="mt-1 inline-flex h-6 w-6 items-center justify-center rounded-md bg-warriorBlack/50 text-sm text-warriorText">×</button>
        </div>

        <div class="mb-3 mt-3 h-2.5 overflow-hidden rounded-full bg-warriorBorder">
          <div class="h-full w-[20%] bg-emerald-400"></div>
          <div class="-mt-2.5 ml-[20%] h-2.5 w-[50%] bg-amber-400"></div>
          <div class="-mt-2.5 ml-[70%] h-2.5 w-[30%] bg-red-400"></div>
        </div>

        <div class="space-y-3">
          <div class="grid grid-cols-[44px_1fr_42px] items-center gap-3">
            <p class="font-poppins text-[13px] font-black text-emerald-400">Easy</p>
            <div class="relative h-1.5 rounded-full bg-warriorBorder">
              <span class="absolute left-[20%] top-1/2 h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-emerald-400 bg-emerald-400"></span>
            </div>
            <p class="text-right font-poppins text-[13px] font-black text-emerald-400">20%</p>
          </div>

          <div class="grid grid-cols-[44px_1fr_42px] items-center gap-3">
            <p class="font-poppins text-[13px] font-black text-amber-400">Medium</p>
            <div class="relative h-1.5 rounded-full bg-warriorBorder">
              <span class="absolute left-[50%] top-1/2 h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-amber-400 bg-amber-400"></span>
            </div>
            <p class="text-right font-poppins text-[13px] font-black text-amber-400">50%</p>
          </div>

          <div class="grid grid-cols-[44px_1fr_42px] items-center gap-3">
            <p class="font-poppins text-[13px] font-black text-red-400">Hard</p>
            <div class="relative h-1.5 rounded-full bg-warriorBorder">
              <span class="absolute left-[30%] top-1/2 h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-red-400 bg-red-400"></span>
            </div>
            <p class="text-right font-poppins text-[13px] font-black text-red-400">30%</p>
          </div>
        </div>

        <button class="mt-4 block w-full rounded-xl border-2 border-warriorBlack bg-mdcat px-4 py-3 text-center font-poppins text-[24px] font-black text-warriorBlack shadow-[3px_3px_0px_rgba(0,0,0,0.5)] sm:text-[24px]">
          Apply Mix
        </button>
      </div>
    </div>
  </body>
</html>

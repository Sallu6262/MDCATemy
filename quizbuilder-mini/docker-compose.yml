services:
  db:
    image: postgres:16-alpine
    container_name: quizmini_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizbuilder
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: quizpass
    ports:
      - "5433:5432"   # host:container — host port 5433 to avoid clashing with a local Postgres
    volumes:
      - quizmini_pgdata:/var/lib/postgresql/data
      # Postgres runs every *.sql in this dir on first boot, in alphabetical order.
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizuser -d quizbuilder"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizmini_backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: quizbuilder
      DATABASE_USERNAME: quizuser
      DATABASE_PASSWORD: quizpass
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizmini_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  quizmini_pgdata:
